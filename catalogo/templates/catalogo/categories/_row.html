<tr>
    <!-- Nome -->
    <td>
        <strong>{{ category.name }}</strong>
    </td>

    <!-- Produtos -->
    <td class="text-center">
        <span class="badge bg-primary rounded-pill">
            {{ category.products.count }}
        </span>
    </td>

    <!-- Status -->
    <td class="text-center">
        {% if category.is_active %}
            <span class="badge bg-success">
                <i class="bi bi-check-circle me-1"></i> Ativa
            </span>
        {% else %}
            <span class="badge bg-secondary">
                <i class="bi bi-x-circle me-1"></i> Inativa
            </span>
        {% endif %}
    </td>

    <!-- Criada em -->
    <td class="text-center">
        <small class="text-muted">
            {{ category.created_at|date:"d/m/Y" }}
        </small>
    </td>

    {% if is_supervisor %}
    <!-- Ações -->
    <td class="text-end">
        <div class="btn-group btn-group-sm">

            <button class="btn btn-outline-info"
                    data-bs-toggle="modal"
                    data-bs-target="#viewCategoryModal{{ category.pk }}">
                <i class="bi bi-eye"></i>
            </button>

            <button class="btn btn-outline-primary"
                    data-bs-toggle="modal"
                    data-bs-target="#editCategoryModal{{ category.pk }}">
                <i class="bi bi-pencil"></i>
            </button>

            {% if category.products.count == 0 %}
            <button class="btn btn-outline-danger"
                    data-bs-toggle="modal"
                    data-bs-target="#deleteCategoryModal{{ category.pk }}">
                <i class="bi bi-trash"></i>
            </button>
            {% else %}
            <button class="btn btn-outline-secondary" disabled>
                <i class="bi bi-trash"></i>
            </button>
            {% endif %}
        </div>
    </td>
    {% endif %}
</tr>
