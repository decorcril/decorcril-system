<div class="text-center py-5">
    <i class="{{ icon }} display-1 text-muted mb-3"></i>
    <h4 class="text-muted">{{ title }}</h4>

    {% if description %}
        <p class="mt-3 text-muted">{{ description }}</p>
    {% endif %}

    {% if show_action %}
        <button type="button"
                class="btn btn-primary mt-2"
                data-bs-toggle="modal"
                data-bs-target="{{ action_target }}">
            {{ action_label }}
        </button>
    {% endif %}
</div>
