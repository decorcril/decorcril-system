<div class="modal fade"
     id="editProductModalComposite{{ product.pk }}"
     tabindex="-1"
     data-base-price="{{ product.numeric_fields.base_price }}">

    <div class="modal-dialog modal-xl">
        <div class="modal-content">

            <div class="modal-header bg-info text-white">
                <h5 class="modal-title">
                    <i class="bi bi-pencil me-2"></i>
                    Editar Produto Composto: {{ product.name }}
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <form method="post"
                  action="{% url 'composite_product_update' product.pk %}"
                  enctype="multipart/form-data">
                {% csrf_token %}

                <div class="alert alert-warning py-2 mb-0">
                    Para alterar os dados de um componente, edite o componente original ou altere os componentes na tela de composição.
                </div>

                <div class="modal-body">
                    <div class="row mb-4">
                        <div class="col-md-4 text-center">
                            <label class="form-label fw-bold">Foto do Produto</label>
                            {% if product.photo %}
                            <div class="mb-2">
                                <img src="{{ product.photo.url }}" class="img-thumbnail"
                                     style="max-height:150px;" alt="{{ product.name }}">
                            </div>
                            {% endif %}
                            <input type="file" name="photo" class="form-control mt-2" accept="image/*"
                                   onchange="previewCompositeImage(event, '{{ product.pk }}')">
                            <small class="text-muted">
                                {% if product.photo %}Alterar foto{% else %}Adicionar foto{% endif %}
                            </small>
                            <div id="imagePreviewComposite{{ product.pk }}" class="mt-3" style="display:none;">
                                <img id="previewImageComposite{{ product.pk }}" class="img-thumbnail" style="max-height:150px;">
                            </div>
                        </div>

                        <div class="col-md-8">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Código do Produto*</label>
                                    <input type="text" name="sku" value="{{ product.sku }}"
                                           class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Nome*</label>
                                    <input type="text" name="name" value="{{ product.name }}"
                                           class="form-control" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Categoria*</label>
                                <select name="category" class="form-select" required>
                                    {% for category in categories %}
                                    <option value="{{ category.pk }}"
                                        {% if category.pk == product.category.pk %}selected{% endif %}>
                                        {{ category.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Preço Base*</label>
                                <input type="text" class="form-control"
                                       id="base_price_display_composite_{{ product.pk }}"
                                       placeholder="0,00" inputmode="decimal" autocomplete="off">
                                <input type="hidden" name="base_price"
                                       id="base_price_value_composite_{{ product.pk }}" required>
                            </div>

                            <div class="form-check form-switch">
                                <input type="checkbox" name="is_active" class="form-check-input"
                                       {% if product.is_active %}checked{% endif %}>
                                <label class="form-check-label">Produto Ativo</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Descrição</label>
                        <textarea name="description" class="form-control" rows="3">{{ product.description }}</textarea>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-info">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
(function () {
    const modalId = 'editProductModalComposite{{ product.pk }}';
    if (window['_compEditInit_' + modalId]) return;
    window['_compEditInit_' + modalId] = true;

    const modal = document.getElementById(modalId);
    if (!modal) return;
    const pid = '{{ product.pk }}';

    function formatBR(v) {
        const d = v.replace(/\D/g, '');
        if (!d) return '';
        return (parseInt(d, 10) / 100).toFixed(2)
            .replace('.', ',')
            .replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    }

    function parseBR(v) {
        return v ? v.replace(/\./g, '').replace(',', '.') : '';
    }

    // Valor vem sempre com ponto decimal via numeric_fields
    function fromBackend(v) {
        if (!v) return '';
        const num = parseFloat(v);
        if (!num) return '';
        return num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    const display = document.getElementById('base_price_display_composite_' + pid);
    const hidden  = document.getElementById('base_price_value_composite_'   + pid);

    // Máscara na digitação (registra uma vez)
    if (display && hidden && !display._masked) {
        display._masked = true;
        display.addEventListener('input', function () {
            const fmt  = formatBR(this.value);
            this.value   = fmt;
            hidden.value = parseBR(fmt);
        });
    }

    // Ao abrir: preenche com valor do backend
    modal.addEventListener('show.bs.modal', function () {
        const fmt     = fromBackend(modal.dataset.basePrice);
        display.value = fmt;
        hidden.value  = fmt ? parseBR(fmt) : '';
    });

    // Ao fechar: limpa preview
    modal.addEventListener('hidden.bs.modal', function () {
        const box = document.getElementById('imagePreviewComposite' + pid);
        const img = document.getElementById('previewImageComposite' + pid);
        if (box) box.style.display = 'none';
        if (img) img.src = '';
    });

    // Antes de enviar: garante que hidden está sincronizado
    modal.querySelector('form').addEventListener('submit', function () {
        hidden.value = parseBR(display.value);
    });

})();

window.previewCompositeImage = window.previewCompositeImage || function (event, pid) {
    const reader = new FileReader();
    reader.onload = () => {
        const img = document.getElementById('previewImageComposite' + pid);
        const box = document.getElementById('imagePreviewComposite' + pid);
        if (img && box) { img.src = reader.result; box.style.display = 'block'; }
    };
    if (event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
};
</script>
