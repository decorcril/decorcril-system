<!-- MODAL PAGAMENTOS DO PEDIDO -->
<div class="modal fade" id="paymentsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">

            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">
                    <i class="bi bi-cash-coin me-2"></i>
                    Pagamentos — Pedido <span id="pay-order-number"></span>
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">

                <!-- Condição de pagamento -->
                <div id="pay-payment-terms-wrap" class="d-none mb-3 p-2 border rounded bg-light small">
                    <span class="text-muted">Condição de pagamento:</span>
                    <strong id="pay-payment-terms"></strong>
                </div>

                <!-- Resumo financeiro -->
                <div class="row g-2 mb-3">
                    <div class="col-6 col-md-3">
                        <div class="border rounded p-2 text-center">
                            <div class="small text-muted">Total do pedido</div>
                            <div class="fw-bold">R$ <span id="pay-total-amount">0,00</span></div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="border rounded p-2 text-center bg-warning bg-opacity-10">
                            <div class="small text-muted">Sinal acordado</div>
                            <div class="fw-bold text-warning">R$ <span id="pay-down-payment">0,00</span></div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="border rounded p-2 text-center bg-success bg-opacity-10">
                            <div class="small text-muted">Total pago</div>
                            <div class="fw-bold text-success">R$ <span id="pay-total-paid">0,00</span></div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="border rounded p-2 text-center bg-danger bg-opacity-10">
                            <div class="small text-muted">Saldo restante</div>
                            <div class="fw-bold text-danger">R$ <span id="pay-remaining">0,00</span></div>
                        </div>
                    </div>
                </div>

                <!-- Lista de pagamentos -->
                <h6 class="fw-semibold text-muted text-uppercase small mb-2">
                    <i class="bi bi-list-check me-1"></i> Pagamentos registrados
                </h6>
                <div id="pay-list" class="mb-3">
                    <p class="text-muted text-center small py-2">Carregando...</p>
                </div>

                <hr>

                <!-- Formulário novo pagamento -->
                <h6 class="fw-semibold text-muted text-uppercase small mb-2">
                    <i class="bi bi-plus-circle me-1"></i> Registrar pagamento
                </h6>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="pay-method" class="form-label">Forma de pagamento *</label>
                        <select class="form-select" id="pay-method">
                            <option value="">Selecione...</option>
                            <option value="pix">PIX</option>
                            <option value="debit">Cartão de Débito</option>
                            <option value="credit">Cartão de Crédito</option>
                            <option value="boleto">Boleto</option>
                            <option value="cash">Dinheiro</option>
                            <option value="transfer">Transferência</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label for="pay-amount" class="form-label">Valor (R$) *</label>
                        <input type="number" step="0.01" min="0.01" class="form-control" id="pay-amount" placeholder="0,00">
                    </div>

                    <div class="col-md-12" id="pay-transaction-wrap">
                        <label for="pay-transaction" class="form-label">
                            Número de transação
                            <span class="text-danger small" id="pay-transaction-hint">*</span>
                        </label>
                        <input type="text" class="form-control" id="pay-transaction"
                               placeholder="Código PIX, NSU, número do boleto...">
                        <div class="invalid-feedback" id="pay-transaction-error"></div>
                    </div>

                    <div class="col-12">
                        <label for="pay-notes" class="form-label">Observações</label>
                        <input type="text" class="form-control" id="pay-notes" placeholder="Opcional...">
                    </div>
                </div>

            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Fechar</button>
                <button type="button" class="btn btn-success" id="pay-submit-btn">
                    <i class="bi bi-check-lg me-1"></i>Registrar Pagamento
                </button>
            </div>

        </div>
    </div>
</div>
