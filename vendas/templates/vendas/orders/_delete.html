<!-- MODAL DELETAR PEDIDO -->
<div class="modal fade"
     id="deleteOrderModal{{ order.pk }}"
     tabindex="-1">

    <div class="modal-dialog">
        <div class="modal-content">

            <form method="post"
                  action="{% url 'vendas:order_delete' order.pk %}">
                {% csrf_token %}

                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-trash me-2"></i>Excluir Pedido
                    </h5>
                    <button type="button"
                            class="btn-close btn-close-white"
                            data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <p>Confirma a exclusão do pedido:</p>
                    <p class="mb-1">
                        <span class="text-muted small">Número:</span>
                        <strong class="font-monospace">{{ order.number }}</strong>
                    </p>
                    <p class="mb-0">
                        <span class="text-muted small">Cliente:</span>
                        <strong>{{ order.client.name }}</strong>
                    </p>
                    <div class="alert alert-warning mt-3 mb-0 small">
                        <i class="bi bi-exclamation-triangle me-1"></i>
                        Esta ação não pode ser desfeita. Todos os itens do pedido serão removidos.
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="submit"
                            class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i>Excluir
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>
